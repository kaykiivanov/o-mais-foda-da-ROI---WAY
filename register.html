<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cadastre-se na AffiliateHub e comece a lucrar com CPA hoje mesmo.">
    <meta name="keywords" content="afiliados, CPA, plataforma de afiliados, dashboard, marketing digital">

    <!-- OpenGraph -->
    <meta property="og:title" content="Cadastrar | AffiliateHub">
    <meta property="og:description" content="Cadastre-se na AffiliateHub e comece a lucrar com CPA hoje mesmo.">
    <meta property="og:image" content="https://kaykiivanov.github.io/o-mais-foda-da-ROI---WAY/social-preview.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kaykiivanov.github.io/o-mais-foda-da-ROI---WAY/register.html">

    <title>Cadastrar | AffiliateHub</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <style>
        /* ===== LOGIN/REGISTER PAGE STYLES ===== */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            position: relative;
            overflow: hidden;
            padding: 20px 0;
        }

        /* Animated background */
        .login-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .login-bg .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            animation: orbFloat 12s ease-in-out infinite;
        }

        .login-bg .orb-1 {
            width: 600px;
            height: 600px;
            background: var(--accent-green);
            top: -200px;
            right: -100px;
            animation-delay: 0s;
        }

        .login-bg .orb-2 {
            width: 500px;
            height: 500px;
            background: #4A90D9;
            bottom: -150px;
            left: -100px;
            animation-delay: -4s;
        }

        .login-bg .orb-3 {
            width: 350px;
            height: 350px;
            background: #F5A623;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -8s;
            opacity: 0.08;
        }

        @keyframes orbFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -30px) scale(1.05);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.95);
            }
        }

        /* Grid pattern overlay */
        .login-bg .grid-pattern {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* Login Container */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 20px;
            animation: fadeInUp 0.6s ease;
        }

        .login-card {
            background: rgba(17, 25, 22, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px 40px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 232, 108, 0.03);
        }

        /* Logo */
        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 12px;
        }

        .login-logo .logo-icon {
            width: 44px;
            height: 44px;
            font-size: 20px;
            border-radius: 12px;
        }

        .login-logo .logo-text {
            font-size: 1.5rem;
        }

        .login-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: var(--font-size-sm);
            margin-bottom: 32px;
        }

        /* Form */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }

        .form-input-wrapper {
            display: flex;
            align-items: center;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0 16px;
            transition: all var(--transition-fast);
            height: 46px;
        }

        .form-input-wrapper:focus-within {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px var(--accent-green-soft), 0 0 20px rgba(0, 232, 108, 0.05);
        }

        .form-input-wrapper svg {
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            flex-shrink: 0;
            transition: color var(--transition-fast);
        }

        .form-input-wrapper:focus-within svg {
            color: var(--accent-green);
        }

        .form-input-wrapper input {
            flex: 1;
            min-width: 0;
            width: 100%;
            background: transparent;
            color: var(--text-primary);
            font-size: 14px;
            padding: 0 12px;
            height: 100%;
        }

        .form-input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .row-group {
            display: flex;
            gap: 16px;
        }

        .row-group .form-group {
            flex: 1;
        }

        /* Submit Button */
        .login-btn {
            width: 100%;
            height: 50px;
            background: linear-gradient(135deg, var(--accent-green) 0%, #00b854 100%);
            color: var(--bg-primary);
            border-radius: 10px;
            font-size: var(--font-size-md);
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all var(--transition-base);
            position: relative;
            overflow: hidden;
            margin-top: 12px;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, transparent 50%);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 232, 108, 0.3);
        }

        .login-btn:hover::before {
            opacity: 1;
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .login-btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(10, 15, 13, 0.3);
            border-top-color: var(--bg-primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        .login-btn.loading .btn-text {
            display: none;
        }

        .login-btn.loading .spinner {
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 24px;
        }

        .login-footer p {
            font-size: var(--font-size-sm);
            color: var(--text-muted);
        }

        .login-footer a {
            color: var(--accent-green);
            font-weight: 600;
            transition: color var(--transition-fast);
        }

        .login-footer a:hover {
            color: var(--accent-green-dim);
            text-decoration: underline;
        }

        /* Error/Success message */
        .form-message {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: var(--font-size-sm);
            margin-bottom: 20px;
        }

        .form-message.show {
            display: flex;
            animation: fadeInUp 0.3s ease;
        }

        .form-message.error {
            background: rgba(255, 71, 87, 0.08);
            border: 1px solid rgba(255, 71, 87, 0.2);
            color: var(--status-negative);
        }

        .form-message.success {
            background: rgba(0, 232, 108, 0.08);
            border: 1px solid rgba(0, 232, 108, 0.2);
            color: var(--accent-green);
        }

        .form-message svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        @media (max-width: 520px) {
            .login-card {
                padding: 32px 24px;
            }

            .row-group {
                flex-direction: column;
                gap: 16px;
            }
        }
    </style>
</head>

<body>

    <!-- Animated Background -->
    <div class="login-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid-pattern"></div>
    </div>

    <!-- Registration Container -->
    <main class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <div class="logo-icon">A</div>
                <h1 class="logo-text" style="margin: 0;">Affiliate<span>Hub</span></h1>
            </div>
            <p class="login-subtitle">Cadastre-se na rede exclusiva de afiliados</p>

            <!-- Message Box -->
            <div class="form-message" id="form-message">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="msg-icon">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="15" y1="9" x2="9" y2="15" id="msg-line1" />
                    <line x1="9" y1="9" x2="15" y2="15" id="msg-line2" />
                </svg>
                <span id="message-text">Erro ao processar.</span>
            </div>

            <!-- Registration Form -->
            <form class="login-form" id="register-form" autocomplete="off">
                <div class="row-group">
                    <div class="form-group">
                        <label class="form-label" for="firstName">Nome</label>
                        <div class="form-input-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                            <input type="text" id="firstName" name="firstName" placeholder="Seu nome" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="lastName">Sobrenome</label>
                        <div class="form-input-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                            <input type="text" id="lastName" name="lastName" placeholder="Seu sobrenome" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">E-mail Profissional</label>
                    <div class="form-input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                            <polyline points="22,6 12,13 2,6" />
                        </svg>
                        <input type="email" id="email" name="email" placeholder="contato@empresa.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">Telefone / WhatsApp</label>
                    <div class="form-input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path
                                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
                        </svg>
                        <input type="tel" id="phone" name="phone" placeholder="(11) 99999-9999" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Senha</label>
                    <div class="form-input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required
                            minlength="8">
                    </div>
                </div>

                <button type="submit" class="login-btn" id="register-btn">
                    <span class="btn-text">Cadastrar</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <div class="login-footer">
                <p>Já possui uma conta? <a href="login.html">Fazer login</a></p>
            </div>
        </div>
    </main>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <script>
        const registerForm = document.getElementById('register-form');
        const registerBtn = document.getElementById('register-btn');
        const formMessage = document.getElementById('form-message');
        const messageText = document.getElementById('message-text');
        const msgIcon = document.getElementById('msg-icon');
        const msgLine1 = document.getElementById('msg-line1');
        const msgLine2 = document.getElementById('msg-line2');

        // Phone mask (simple)
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
        });

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            formMessage.classList.remove('show');

            const password = document.getElementById('password').value;
            if (password.length < 8) {
                showMessage('A senha deve ter pelo menos 8 caracteres.', 'error');
                return;
            }

            // Show loading
            registerBtn.classList.add('loading');

            async function handleRegister() {
                try {
                    const firstName = document.getElementById('firstName').value.trim();
                    const lastName = document.getElementById('lastName').value.trim();
                    const email = document.getElementById('email').value.trim();
                    const phone = document.getElementById('phone').value.trim();
                    const password = document.getElementById('password').value;

                    // 1. First, create the user in Supabase Auth (Optional but recommended for real auth)
                    // For this simple implementation, we'll just insert into the 'users' table 
                    // as requested in the SQL snippet provided earlier.

                    const colors = ['#00E86C', '#4A90D9', '#E84393', '#F5A623', '#9B59B6', '#FF6B35', '#1ABC9C'];
                    const randomColor = colors[Math.floor(Math.random() * colors.length)];

                    const { data, error } = await supabase
                        .from('users')
                        .insert([
                            {
                                name: firstName + ' ' + lastName,
                                email: email,
                                phone: phone,
                                initials: (firstName[0] + lastName[0]).toUpperCase(),
                                color: randomColor,
                                role: 'affiliate',
                                status: 'pending',
                                logins: 0
                            }
                        ]);

                    if (error) throw error;

                    // Show success message
                    showMessage('Sua solicitação foi enviada! Você será aprovado em breve pelo administrador.', 'success');

                    // Auto redirect to login after 3.5 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3500);

                } catch (error) {
                    console.error('Erro ao cadastrar:', error);
                    showMessage('Erro ao realizar cadastro: ' + (error.message || 'Verifique sua conexão.'), 'error');
                } finally {
                    registerBtn.classList.remove('loading');
                }
            }

            handleRegister();
        });

        function showMessage(msg, type) {
            messageText.textContent = msg;
            formMessage.className = 'form-message ' + type + ' show';

            if (type === 'success') {
                msgIcon.innerHTML = '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>';
            } else {
                msgIcon.innerHTML = '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>';
            }
        }
    </script>
</body>

</html>
