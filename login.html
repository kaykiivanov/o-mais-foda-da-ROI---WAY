<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="AffiliateHub - Faça login para acessar sua plataforma de gestão de afiliados CPA.">
    <title>AffiliateHub - Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <style>
        /* ===== LOGIN PAGE STYLES ===== */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            position: relative;
            overflow: hidden;
        }

        /* Animated background */
        .login-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .login-bg .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            animation: orbFloat 12s ease-in-out infinite;
        }

        .login-bg .orb-1 {
            width: 600px;
            height: 600px;
            background: var(--accent-green);
            top: -200px;
            right: -100px;
            animation-delay: 0s;
        }

        .login-bg .orb-2 {
            width: 500px;
            height: 500px;
            background: #4A90D9;
            bottom: -150px;
            left: -100px;
            animation-delay: -4s;
        }

        .login-bg .orb-3 {
            width: 350px;
            height: 350px;
            background: #E84393;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -8s;
            opacity: 0.06;
        }

        @keyframes orbFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -30px) scale(1.05);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.95);
            }
        }

        /* Grid pattern overlay */
        .login-bg .grid-pattern {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* Login Container */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            padding: 20px;
            animation: fadeInUp 0.6s ease;
        }

        .login-card {
            background: rgba(17, 25, 22, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 232, 108, 0.03);
        }

        /* Logo */
        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 12px;
        }

        .login-logo .logo-icon {
            width: 48px;
            height: 48px;
            font-size: 22px;
            border-radius: 14px;
        }

        .login-logo .logo-text {
            font-size: 1.75rem;
        }

        .login-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: var(--font-size-base);
            margin-bottom: 40px;
        }

        /* Form */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: var(--font-size-sm);
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }

        .form-input-wrapper {
            display: flex;
            align-items: center;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0 16px;
            transition: all var(--transition-fast);
            height: 50px;
        }

        .form-input-wrapper:focus-within {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px var(--accent-green-soft), 0 0 20px rgba(0, 232, 108, 0.05);
        }

        .form-input-wrapper svg {
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            flex-shrink: 0;
            transition: color var(--transition-fast);
        }

        .form-input-wrapper:focus-within svg {
            color: var(--accent-green);
        }

        .form-input-wrapper input {
            flex: 1;
            background: transparent;
            color: var(--text-primary);
            font-size: var(--font-size-base);
            padding: 0 12px;
            height: 100%;
        }

        .form-input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .password-toggle {
            cursor: pointer;
            padding: 4px;
            color: var(--text-muted);
            transition: color var(--transition-fast);
            display: flex;
            align-items: center;
        }

        .password-toggle:hover {
            color: var(--text-primary);
        }

        .password-toggle svg {
            width: 18px;
            height: 18px;
        }

        /* Remember & Forgot */
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox-wrapper input[type="checkbox"] {
            display: none;
        }

        .custom-checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }

        .custom-checkbox svg {
            width: 12px;
            height: 12px;
            color: var(--bg-primary);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .checkbox-wrapper input[type="checkbox"]:checked+.custom-checkbox {
            background: var(--accent-green);
            border-color: var(--accent-green);
        }

        .checkbox-wrapper input[type="checkbox"]:checked+.custom-checkbox svg {
            opacity: 1;
        }

        .checkbox-label {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
        }

        .forgot-link {
            font-size: var(--font-size-sm);
            color: var(--accent-green);
            font-weight: 500;
            transition: color var(--transition-fast);
        }

        .forgot-link:hover {
            color: var(--accent-green-dim);
            text-decoration: underline;
        }

        /* Submit Button */
        .login-btn {
            width: 100%;
            height: 52px;
            background: linear-gradient(135deg, var(--accent-green) 0%, #00b854 100%);
            color: var(--bg-primary);
            border-radius: 10px;
            font-size: var(--font-size-md);
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all var(--transition-base);
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, transparent 50%);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 232, 108, 0.3);
        }

        .login-btn:hover::before {
            opacity: 1;
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .login-btn .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(10, 15, 13, 0.3);
            border-top-color: var(--bg-primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        .login-btn.loading .btn-text {
            display: none;
        }

        .login-btn.loading .spinner {
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Divider */
        .login-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 4px 0;
        }

        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .login-divider span {
            font-size: var(--font-size-xs);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 32px;
        }

        .login-footer p {
            font-size: var(--font-size-sm);
            color: var(--text-muted);
        }

        .login-footer a {
            color: var(--accent-green);
            font-weight: 600;
            transition: color var(--transition-fast);
        }

        .login-footer a:hover {
            color: var(--accent-green-dim);
            text-decoration: underline;
        }

        /* Error message */
        .form-error {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(255, 71, 87, 0.08);
            border: 1px solid rgba(255, 71, 87, 0.2);
            border-radius: 10px;
            font-size: var(--font-size-sm);
            color: var(--status-negative);
        }

        .form-error.show {
            display: flex;
            animation: fadeInUp 0.3s ease;
        }

        .form-error svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* Stats footer */
        .login-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .login-stat {
            text-align: center;
        }

        .login-stat-value {
            font-size: var(--font-size-xl);
            font-weight: 800;
            color: var(--accent-green);
        }

        .login-stat-label {
            font-size: var(--font-size-xs);
            color: var(--text-muted);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Responsive */
        @media (max-width: 520px) {
            .login-card {
                padding: 36px 24px;
            }

            .login-stats {
                gap: 24px;
            }
        }
    </style>
</head>

<body>

    <!-- Animated Background -->
    <div class="login-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid-pattern"></div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <div class="logo-icon">A</div>
                <div class="logo-text">Affiliate<span>Hub</span></div>
            </div>
            <p class="login-subtitle">Acesse sua plataforma de gestão de afiliados</p>

            <!-- Error Message -->
            <div class="form-error" id="form-error">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="15" y1="9" x2="9" y2="15" />
                    <line x1="9" y1="9" x2="15" y2="15" />
                </svg>
                <span id="error-text">E-mail ou senha incorretos.</span>
            </div>

            <!-- Login Form -->
            <form class="login-form" id="login-form" autocomplete="on">
                <div class="form-group">
                    <label class="form-label" for="email">E-mail</label>
                    <div class="form-input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                            <polyline points="22,6 12,13 2,6" />
                        </svg>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required
                            autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Senha</label>
                    <div class="form-input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        <input type="password" id="password" name="password" placeholder="••••••••" required
                            autocomplete="current-password">
                        <div class="password-toggle" id="password-toggle">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eye-icon">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="remember" checked>
                        <div class="custom-checkbox">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <polyline points="20 6 9 17 4 12" />
                            </svg>
                        </div>
                        <span class="checkbox-label">Lembrar de mim</span>
                    </label>
                    <a href="#" class="forgot-link">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="login-btn" id="login-btn">
                    <span class="btn-text">Entrar</span>
                    <div class="spinner"></div>
                </button>

                <div class="login-divider">
                    <span>ou</span>
                </div>
            </form>

            <div class="login-footer">
                <p>Ainda não tem conta? <a href="register.html">Solicitar acesso</a></p>
            </div>

            <!-- Stats -->
            <div class="login-stats">
                <div class="login-stat">
                    <div class="login-stat-value">500+</div>
                    <div class="login-stat-label">Afiliados</div>
                </div>
                <div class="login-stat">
                    <div class="login-stat-value">R$ 2M+</div>
                    <div class="login-stat-label">Faturamento</div>
                </div>
                <div class="login-stat">
                    <div class="login-stat-value">99.9%</div>
                    <div class="login-stat-label">Uptime</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== LOGIN LOGIC =====
        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('password-toggle');
        const formError = document.getElementById('form-error');
        const errorText = document.getElementById('error-text');

        // Demo credentials
        const DEMO_EMAIL = 'admin@affiliatehub.com';
        const DEMO_PASSWORD = '123456';

        // Password visibility toggle
        let passwordVisible = false;
        passwordToggle.addEventListener('click', () => {
            passwordVisible = !passwordVisible;
            passwordInput.type = passwordVisible ? 'text' : 'password';
            document.getElementById('eye-icon').innerHTML = passwordVisible
                ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
                : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        });

        // Form submit
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            formError.classList.remove('show');

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Por favor, preencha todos os campos.');
                return;
            }

            // Show loading
            loginBtn.classList.add('loading');

            // Simulate auth delay
            setTimeout(() => {
                if (email === DEMO_EMAIL && password === DEMO_PASSWORD) {
                    // Success - redirect to dashboard
                    localStorage.setItem('affiliatehub_logged_in', 'true');
                    localStorage.setItem('affiliatehub_user', JSON.stringify({
                        name: 'kayki andrade',
                        email: email,
                        role: 'Manager'
                    }));
                    window.location.href = 'index.html';
                } else {
                    // Error
                    loginBtn.classList.remove('loading');
                    showError('E-mail ou senha incorretos. Use admin@affiliatehub.com / 123456');
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            }, 1200);
        });

        function showError(msg) {
            errorText.textContent = msg;
            formError.classList.add('show');
        }

        // Auto-fill hint on focus
        emailInput.addEventListener('focus', () => {
            if (!emailInput.value) {
                emailInput.setAttribute('placeholder', 'admin@affiliatehub.com');
            }
        });

        emailInput.addEventListener('blur', () => {
            emailInput.setAttribute('placeholder', 'seu@email.com');
        });

        // Check if already logged in
        if (localStorage.getItem('affiliatehub_logged_in') === 'true') {
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
